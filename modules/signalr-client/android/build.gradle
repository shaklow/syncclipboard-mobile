plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.jericx.syncclipboardmobile'
version = '1.0.0'

android {
  namespace "expo.modules.signalrclient"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:0.83.2'
  implementation 'androidx.core:core-ktx:1.13.1'
  implementation project(':native-util')
  implementation 'com.microsoft.signalr:signalr:8.0.15'
  implementation 'com.google.code.gson:gson:2.11.0'
}
