name: publish-gitee-release

on:
  workflow_call:
    secrets:
      GITEE_PRIVATE_KEY:
        required: true
      GITEE_ACCESS_TOKEN:
        required: true

jobs:
  sync-to-gitee:
    name: Sync to Gitee
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH for Gitee
        run: |
          mkdir -p ~/.ssh
          # Debug: Check if secret exists
          if [ -z "${{ secrets.GITEE_PRIVATE_KEY }}" ]; then
            echo "ERROR: GITEE_PRIVATE_KEY secret is empty or not set!"
            exit 1
          fi
          # Decode base64
          echo "${{ secrets.GITEE_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_rsa || {
            echo "ERROR: Base64 decode failed. Secret may not be in base64 format."
            exit 1
          }
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      - name: Verify SSH key
        run: |
          # Verify key file exists and is valid
          test -f ~/.ssh/id_rsa || { echo "ERROR: SSH key file not found"; exit 1; }
          ssh-keygen -l -f ~/.ssh/id_rsa >/dev/null 2>&1 || { echo "ERROR: Invalid SSH key format"; exit 1; }
          echo "SSH key verified successfully"
          echo "=== Testing connection to Gitee ==="
          ssh -T git@gitee.com -o StrictHostKeyChecking=yes || true

      - name: Bare clone from GitHub
        run: |
          git clone --bare https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git bare-repo

      - name: Mirror push to Gitee
        run: |
          cd bare-repo
          git push git@gitee.com:shaklow/syncclipboard-mobile.git \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*' \
            --prune

  publish-gitee-release-create:
    name: Create Gitee Release
    needs: [sync-to-gitee]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract changelog from CHANGES.md
        run: |
          awk 'NR==1{next} /^$/{exit} {print}' CHANGES.md > feature.txt

      - name: Delete existing releases in same channel
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: shaklow
          GITEE_REPO: syncclipboard-mobile
          IS_PRERELEASE: ${{ contains(github.ref_name, 'beta') }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          token = os.environ["GITEE_TOKEN"]
          owner = os.environ["GITEE_OWNER"]
          repo = os.environ["GITEE_REPO"]
          is_prerelease = os.environ["IS_PRERELEASE"] == "true"

          url = f"https://gitee.com/api/v5/repos/{owner}/{repo}/releases?access_token={token}&page=1&per_page=20"
          with urllib.request.urlopen(url) as response:
              releases = json.loads(response.read())

          to_delete = [r for r in releases if r.get("prerelease") == is_prerelease]
          for release in to_delete:
              rid = release["id"]
              del_url = f"https://gitee.com/api/v5/repos/{owner}/{repo}/releases/{rid}?access_token={token}"
              req = urllib.request.Request(del_url, method="DELETE")
              with urllib.request.urlopen(req) as resp:
                  print(f"Deleted release {rid}: {release.get('name')}, status: {resp.status}")
          PYEOF

      - name: Create Gitee Release
        id: create_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: shaklow
          GITEE_REPO: syncclipboard-mobile
          TAG_NAME: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ contains(github.ref_name, 'beta') }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          data = {
              "access_token": os.environ["GITEE_TOKEN"],
              "tag_name": os.environ["TAG_NAME"],
              "name": "WIP: " + os.environ["TAG_NAME"],
              "body": open("feature.txt").read(),
              "prerelease": os.environ["IS_PRERELEASE"] == "true",
              "target_commitish": "main"
          }
          with open("release.json", "w") as f:
              json.dump(data, f)
          PYEOF

          RESPONSE=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            -H "Content-Type: application/json" \
            -d @release.json)
          echo "Gitee API response: $RESPONSE"

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

  publish-gitee-release-upload:
    name: Upload APK to Gitee Release (${{ matrix.abi }})
    needs: [publish-gitee-release-create]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, universal]

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: apk-${{ matrix.abi }}
          path: apk/

      - name: Upload APK to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: shaklow
          GITEE_REPO: syncclipboard-mobile
          RELEASE_ID: ${{ needs.publish-gitee-release-create.outputs.release_id }}
        run: |
          APK=$(ls apk/*.apk | head -1)
          echo "Uploading $APK..."
          curl -s -X POST \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${APK}"
          echo ""

  publish-gitee-release-finalize:
    name: Finalize Gitee Release
    needs: [publish-gitee-release-upload, publish-gitee-release-create]
    runs-on: ubuntu-latest

    steps:
      - name: Update Release Title
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
          GITEE_OWNER: shaklow
          GITEE_REPO: syncclipboard-mobile
          RELEASE_ID: ${{ needs.publish-gitee-release-create.outputs.release_id }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # 先获取现有 release，提取必填字段 (tag_name, body, prerelease)
          EXISTING=$(curl -s --retry 3 --retry-delay 5 \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}?access_token=${GITEE_TOKEN}")

          # 构建 PATCH body，包含所有必填字段
          PATCH_BODY=$(echo "$EXISTING" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          patch = {
              'access_token': '${GITEE_TOKEN}',
              'name': '${TAG_NAME}',
              'tag_name': r['tag_name'],
              'body': r['body'],
              'prerelease': r['prerelease'],
          }
          print(json.dumps(patch))
          ")

          RESPONSE=$(curl -s --retry 3 --retry-delay 5 -X PATCH \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY")
          echo "Gitee API response: $RESPONSE"
          UPDATED_NAME=$(echo "$RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin)["name"])')
          echo "Updated release title: $UPDATED_NAME"
